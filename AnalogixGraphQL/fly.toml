# Fly.io configuration for AnalogixGraphQL
# Docs: https://fly.io/docs/reference/configuration/

app = "analogix-graphql"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4000"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[deploy]
  release_command = "echo 'release ok'"

# -----------------------------------------------------------------------------
# Secrets — set these with `fly secrets set` (one-time, per environment):
#
#   fly secrets set \
#     SUPABASE_URL=https://YOUR-PROJECT.supabase.co \
#     SUPABASE_ANON_KEY=... \
#     SUPABASE_SERVICE_ROLE_KEY=... \
#     GROQ_API_KEY=... \
#     GROQ_API_KEY_2=... \
#     GOOGLE_CLIENT_ID=... \
#     GOOGLE_CLIENT_SECRET=... \
#     DESMOS_API_KEY=... \
#     REDIS_URL=rediss://default:...@...upstash.io:6379
#
# Verify with `fly secrets list`.
# -----------------------------------------------------------------------------
