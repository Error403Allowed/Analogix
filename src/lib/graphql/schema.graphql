  stepByStep: Boolean!
  realWorldExamples: Boolean!
  customInstructions: String!
  personaDescription: String!
  useEmojis: Boolean!
  useAnalogies: Boolean!
  analogyFrequency: Int!
  useSectionDividers: Boolean
  createdAt: DateTime
  updatedAt: DateTime
}

type AIMemoryFragment {
  id: ID!
