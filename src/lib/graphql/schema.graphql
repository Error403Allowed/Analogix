# ─── Input Types ─────────────────────────────────────────────────────────────

input UpdateProfileInput {
  name: String
  grade: String
  state: String
  subjects: [String!]
  hobbies: [String!]
  interests: JSON
  timezone: String
  onboardingComplete: Boolean
}

input CreateEventInput {
  title: String!
  date: DateTime!
  endDate: DateTime
  type: String
  subject: String
  location: String
  description: String
  color: String
  source: String
}

input UpdateEventInput {
  title: String
  date: DateTime
  endDate: DateTime
  type: String
  subject: String
  location: String
  description: String
  color: String
}

input CreateDeadlineInput {
  title: String!
  dueDate: DateTime!
  subject: String
  priority: String
}

input UpdateDeadlineInput {
  title: String
  dueDate: DateTime
  subject: String
  priority: String
}

input CreateFlashcardSetInput {
  subjectId: String!
  name: String!
}

input CreateFlashcardInput {
  subjectId: String!
  setId: ID
  front: String!
  back: String!
  sourceSessionId: ID
}

input UpdateFlashcardInput {
  front: String
  back: String
}

input ReviewFlashcardInput {
  flashcardId: ID!
  rating: Int!
}

input CreateRoomInput {
  title: String!
  topic: String
  visibility: String
  subjectId: String
}

input JoinRoomInput {
  joinCode: String!
}

input SendRoomMessageInput {
  roomId: ID!
  content: String!
  messageType: String
}

input UpdateAIPersonalityInput {
  friendliness: Int
  formality: Int
  humor: Int
  detailLevel: Int
  patience: Int
  encouragement: Int
  socraticMethod: Boolean
  stepByStep: Boolean
  realWorldExamples: Boolean
  customInstructions: String
  personaDescription: String
  useEmojis: Boolean
  useAnalogies: Boolean
  analogyFrequency: Int
  useSectionDividers: Boolean
}

input CreateMemoryInput {
  content: String!
  memoryType: String!
  importance: Float
  sessionId: ID
}

input UpdateMemoryInput {
  importance: Float
  reinforce: Boolean
}

input CreateSubjectDataInput {
  subjectId: String!
  marks: JSON
  notes: JSON
}

input CreateCustomSubjectInput {
  subjectId: String!
  customIcon: String
  customColor: String
  customCover: String
  customTitle: String
}

input UpdateUserPreferencesInput {
  mood: String
  theme: String
}

input UpdateUserSettingsInput {
  settings: JSON!
}

# ─── Query ───────────────────────────────────────────────────────────────────

type Query {
  me: Profile
  userStats: UserStats
  subjects: [SubjectData!]!
  customSubjects: [CustomSubject!]!
  events(startDate: String, endDate: String): [Event!]!
  deadlines(subject: String): [Deadline!]!
  achievements: [Achievement!]!
  chatSessions(subjectId: String): [ChatSession!]!
  chatMessages(sessionId: ID!, limit: Int): [ChatMessage!]!
  flashcardSets(subjectId: String): [FlashcardSet!]!
  flashcardSet(id: ID!): FlashcardSet
  flashcards(subjectId: String, dueOnly: Boolean): [Flashcard!]!
  rooms: [StudyRoom!]!
  room(id: ID!): StudyRoom
  roomMembers(roomId: ID!): [StudyRoomMember!]!
  roomMessages(roomId: ID!, limit: Int): [StudyRoomMessage!]!
  aiPersonality: AIPersonality
  aiMemories(type: String, limit: Int): [AIMemoryFragment!]!
  aiMemorySummaries: [AIMemorySummary!]!
  agents: [Agent!]!
  userAgents: [UserAgent!]!
  pendingConfirmations: [AgentConfirmation!]!
  activityLog(startDate: String, endDate: String): [ActivityLog!]!
  userPreferences: UserPreferences
  userSettings: UserSettings
  workspaceEntities(entityType: String): [WorkspaceEntity!]!
  calendarIntegrations: [CalendarIntegration!]!
  quizPerformance(limit: Int): [QuizPerformance!]!
  studySessions(limit: Int): [StudySessionRecord!]!
}

# ─── Mutation ────────────────────────────────────────────────────────────────

type Mutation {
  updateProfile(input: UpdateProfileInput!): Profile
  completeOnboarding(input: UpdateProfileInput!): Profile
  createEvent(input: CreateEventInput!): Event
  updateEvent(id: ID!, input: UpdateEventInput!): Event
  deleteEvent(id: ID!): Boolean
  createDeadline(input: CreateDeadlineInput!): Deadline
  updateDeadline(id: ID!, input: UpdateDeadlineInput!): Deadline
  deleteDeadline(id: ID!): Boolean
  createFlashcardSet(input: CreateFlashcardSetInput!): FlashcardSet
  deleteFlashcardSet(id: ID!): Boolean
  createFlashcard(input: CreateFlashcardInput!): Flashcard
  updateFlashcard(id: ID!, input: UpdateFlashcardInput!): Flashcard
  deleteFlashcard(id: ID!): Boolean
  reviewFlashcard(input: ReviewFlashcardInput!): Flashcard
  createRoom(input: CreateRoomInput!): StudyRoom
  joinRoom(input: JoinRoomInput!): StudyRoom
  leaveRoom(roomId: ID!): Boolean
  sendRoomMessage(input: SendRoomMessageInput!): StudyRoomMessage
  updateAIPersonality(input: UpdateAIPersonalityInput!): AIPersonality
  createMemory(input: CreateMemoryInput!): AIMemoryFragment
  updateMemory(id: ID!, input: UpdateMemoryInput!): Boolean
  deleteMemory(id: ID!): Boolean
  upsertSubjectData(input: CreateSubjectDataInput!): SubjectData
  upsertCustomSubject(input: CreateCustomSubjectInput!): CustomSubject
  updateUserPreferences(input: UpdateUserPreferencesInput!): UserPreferences
  updateUserSettings(input: UpdateUserSettingsInput!): UserSettings
  incrementActivity: Boolean
  confirmAgentAction(confirmationId: ID!, approved: Boolean!): Boolean
}
