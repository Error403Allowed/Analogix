  summary: String!
  status: String
  createdAt: DateTime
  expiresAt: DateTime
  respondedAt: DateTime
}

type ActivityLog {
  id: ID!
  userId: ID!
  date: String!
  count: Int!
  updatedAt: DateTime
}

type UserPreferences {
  userId: ID!
  mood: String
  theme: String
  updatedAt: DateTime
}

type UserSettings {
  userId: ID!
  settings: JSON
  createdAt: DateTime
  updatedAt: DateTime
}

type WorkspaceEntity {
