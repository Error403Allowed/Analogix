  maxMembers: Int
  currentMembers: Int
  studyTopic: String
  studyNotes: String
  timerDuration: Int
  timerStartedAt: DateTime
  timerPausedAt: DateTime
  timerElapsed: Int
  joinCode: String
  visibility: String
  memberCount: Int
  timerState: String
  timerDurationSeconds: Int
  timerElapsedSeconds: Int
  createdAt: DateTime
  updatedAt: DateTime
}

type StudyRoomMember {
  id: ID!
  roomId: ID!
  userId: ID!
  role: String
  joinedAt: DateTime
  lastSeen: DateTime
  isOnline: Boolean
  name: String
  avatarUrl: String
}

type StudyRoomMessage {
  id: ID!
  roomId: ID!
  userId: ID
  content: String!
  messageType: String
  aiContext: JSON
  createdAt: DateTime
  name: String
  avatarUrl: String
}

type AIPersonality {
