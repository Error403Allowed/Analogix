scalar DateTime
scalar JSON

type Profile {
  id: ID!
  name: String
  grade: String
  state: String
  subjects: [String!]
  hobbies: [String!]
  hobbyDetails: JSON
  interests: JSON
  timezone: String
  onboardingComplete: Boolean
  createdAt: DateTime
  updatedAt: DateTime
}

type UserStats {
  id: ID!
  userId: ID!
  quizzesDone: Int!
  currentStreak: Int!
  accuracy: Int!
  conversationsCount: Int!
  topSubject: String
  subjectCounts: JSON
  updatedAt: DateTime
}

type SubjectData {
  id: ID!
  userId: ID!
  subjectId: String!
  marks: JSON
  notes: JSON
  updatedAt: DateTime
}

type CustomSubject {
  id: ID!
  userId: ID!
  subjectId: String!
  customIcon: String
  customColor: String
  customCover: String
  customTitle: String
  createdAt: DateTime
  updatedAt: DateTime
}

type Event {
  id: ID!
  userId: ID!
  title: String!
  date: DateTime!
  endDate: DateTime
  type: String
  subject: String
  location: String
  description: String
  color: String
  source: String
  createdAt: DateTime
}

type Deadline {
  id: ID!
  userId: ID!
  title: String!
  dueDate: DateTime!
  subject: String
  priority: String
  createdAt: DateTime
}

type Achievement {
  id: ID!
  userId: ID!
  achievementId: String!
  unlockedAt: DateTime
}

type ChatSession {
  id: ID!
  userId: ID!
  subjectId: String!
  title: String
  createdAt: DateTime
  updatedAt: DateTime
}

type ChatMessage {
  id: ID!
  sessionId: ID!
  userId: ID!
